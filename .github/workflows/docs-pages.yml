name: Pocketr Docs

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - pocketr-docs/**
      - .github/workflows/docs-pages.yml
      - .github/workflows/release.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'pages' || format('docs-build-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pocketr-docs/package-lock.json

      - name: Install dependencies
        working-directory: pocketr-docs
        run: npm ci

      - name: Typecheck
        working-directory: pocketr-docs
        run: npm run typecheck

      - name: Build
        working-directory: pocketr-docs
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: pocketr-docs/build

  deploy:
    name: Deploy docs
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
