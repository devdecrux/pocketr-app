spring:
  application:
    name: pocketr-api
  datasource:
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jpa:
    hibernate:
      ddl-auto: validate

server:
  servlet:
    session:
      timeout: 5m

app:
  security:
    csrf-cookie-path: ${APP_SECURITY_CSRF_COOKIE_PATH:/}

ledger:
  accounts:
    snapshot:
      balance:
        enabled: true
  current-balance:
    integrity-log-on-startup: true
