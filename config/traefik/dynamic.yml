http:
  routers:
    # Local-dev only: keep explicit localhost/host.docker.internal host matching.
    api-router:
      rule: "(Host(`localhost`) || Host(`127.0.0.1`) || Host(`host.docker.internal`)) && PathPrefix(`/api`)"
      entryPoints:
        - web
      priority: 100
      service: api-service

    frontend-router:
      rule: "(Host(`localhost`) || Host(`127.0.0.1`) || Host(`host.docker.internal`)) && PathPrefix(`/`)"
      entryPoints:
        - web
      priority: 1
      service: frontend-service

  services:
    api-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8081"

    frontend-service:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5173"
